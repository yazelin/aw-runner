<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aw-runner // status</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00ff41;
    --green-dim: #00aa2b;
    --green-glow: rgba(0,255,65,0.15);
    --amber: #ffb700;
    --red: #ff3b3b;
    --bg: #030507;
    --surface: rgba(0,255,65,0.03);
    --border: rgba(0,255,65,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 99;
  }

  /* Grid background */
  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,65,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,65,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 60px 24px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    margin-bottom: 48px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 32px;
  }

  .sys-label {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--green-dim);
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(28px, 6vw, 52px);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1;
    text-shadow: 0 0 30px rgba(0,255,65,0.5), 0 0 60px rgba(0,255,65,0.2);
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 12px;
    color: var(--green-dim);
    letter-spacing: 0.15em;
  }

  /* Status card */
  .status-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 32px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.5s, box-shadow 0.5s;
  }

  .status-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    opacity: 0.4;
  }

  .status-card.online {
    border-color: rgba(0,255,65,0.25);
    box-shadow: 0 0 40px rgba(0,255,65,0.05), inset 0 0 40px rgba(0,255,65,0.02);
  }

  .status-card.offline {
    border-color: rgba(255,59,59,0.25);
    box-shadow: 0 0 40px rgba(255,59,59,0.05);
  }

  .status-card.offline::before {
    background: linear-gradient(90deg, transparent, var(--red), transparent);
  }

  .status-card.loading {
    border-color: rgba(255,183,0,0.2);
  }

  /* Main status row */
  .status-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
  }

  .pulse-ring {
    position: relative;
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }

  .pulse-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
  }

  .pulse-dot.offline { background: var(--red); box-shadow: 0 0 8px var(--red); }
  .pulse-dot.loading { background: var(--amber); box-shadow: 0 0 8px var(--amber); }

  .pulse-ring::after {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 1px solid var(--green);
    animation: ripple 2s ease-out infinite;
  }

  .pulse-ring.offline::after { border-color: var(--red); animation: none; }
  .pulse-ring.loading::after { border-color: var(--amber); animation: ripple 1s ease-out infinite; }

  @keyframes ripple {
    0%   { transform: scale(0.6); opacity: 0.8; }
    100% { transform: scale(2.4); opacity: 0; }
  }

  .status-text {
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .status-text.online  { color: var(--green); text-shadow: 0 0 20px rgba(0,255,65,0.4); }
  .status-text.offline { color: var(--red);   text-shadow: 0 0 20px rgba(255,59,59,0.4); }
  .status-text.loading { color: var(--amber); }

  /* Metrics grid */
  .metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  @media (max-width: 500px) {
    .metrics { grid-template-columns: 1fr; }
  }

  .metric {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 16px 20px;
  }

  .metric-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--green-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .metric-value {
    font-size: 22px;
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    color: var(--green);
    text-shadow: 0 0 15px rgba(0,255,65,0.3);
    word-break: break-all;
  }

  .metric-value.small {
    font-size: 12px;
    font-family: 'Share Tech Mono', monospace;
    font-weight: 400;
    letter-spacing: 0.05em;
  }

  .metric-value.dim { color: var(--green-dim); }

  /* Log panel */
  .log-panel {
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 20px;
    font-size: 12px;
    line-height: 1.8;
    max-height: 180px;
    overflow-y: auto;
  }

  .log-panel::-webkit-scrollbar { width: 4px; }
  .log-panel::-webkit-scrollbar-track { background: transparent; }
  .log-panel::-webkit-scrollbar-thumb { background: var(--green-dim); border-radius: 2px; }

  .log-line { display: flex; gap: 12px; }
  .log-time { color: var(--green-dim); flex-shrink: 0; }
  .log-msg  { color: var(--green); }
  .log-msg.warn { color: var(--amber); }
  .log-msg.err  { color: var(--red); }

  /* Refresh bar */
  .refresh-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 20px;
    font-size: 11px;
    color: var(--green-dim);
    letter-spacing: 0.1em;
  }

  .refresh-bar-wrap {
    width: 120px;
    height: 2px;
    background: rgba(0,255,65,0.1);
    border-radius: 1px;
    overflow: hidden;
  }

  .refresh-bar {
    height: 100%;
    background: var(--green-dim);
    border-radius: 1px;
    transform-origin: left;
    animation: countdown 30s linear infinite;
  }

  @keyframes countdown {
    from { transform: scaleX(1); }
    to   { transform: scaleX(0); }
  }

  /* Footer */
  footer {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--green-dim);
    letter-spacing: 0.1em;
  }

  footer a {
    color: var(--green-dim);
    text-decoration: none;
    transition: color 0.2s;
  }
  footer a:hover { color: var(--green); }

  /* Blink cursor */
  .blink {
    animation: blink 1s step-end infinite;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }

  /* Flatline for offline */
  .flatline {
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--red), transparent);
    margin: 16px 0;
    animation: flatline 2s ease-in-out infinite;
  }
  @keyframes flatline {
    0%, 100% { opacity: 0.3; }
    50%       { opacity: 1; }
  }
</style>
</head>
<body>
<div class="grid-bg"></div>

<div class="container">
  <header>
    <div class="sys-label">SYSTEM MONITOR // GITHUB ACTIONS RUNNER</div>
    <h1>AW-RUNNER</h1>
    <div class="subtitle">LONG-RUNNING FASTAPI · CLOUDFLARE TUNNEL · COPILOT AGENT</div>
  </header>

  <div class="status-card loading" id="statusCard">
    <div class="status-row">
      <div class="pulse-ring loading" id="pulseRing">
        <div class="pulse-dot loading" id="pulseDot"></div>
      </div>
      <div class="status-text loading" id="statusText">INITIALIZING<span class="blink">_</span></div>
    </div>

    <div class="metrics" id="metrics">
      <div class="metric">
        <div class="metric-label">UPTIME</div>
        <div class="metric-value dim" id="uptime">──────</div>
      </div>
      <div class="metric">
        <div class="metric-label">UPTIME (RAW)</div>
        <div class="metric-value small dim" id="uptimeSeconds">──────</div>
      </div>
      <div class="metric" style="grid-column: 1/-1">
        <div class="metric-label">TUNNEL ENDPOINT</div>
        <div class="metric-value small dim" id="tunnelUrl">──────</div>
      </div>
    </div>
  </div>

  <div class="log-panel" id="logPanel"></div>

  <div class="refresh-row">
    <span id="lastCheck">LAST CHECK ──────────────</span>
    <div style="display:flex;align-items:center;gap:8px;">
      <span>REFRESH IN 30s</span>
      <div class="refresh-bar-wrap">
        <div class="refresh-bar" id="refreshBar"></div>
      </div>
    </div>
  </div>

  <footer>
    <span>© 2026 YAZELIN · AW-RUNNER</span>
    <a href="https://github.com/yazelin/aw-runner" target="_blank">[ SOURCE ]</a>
  </footer>
</div>

<script>
const WORKER_STATUS_URL = 'https://aw-runner-worker.yazelinj303.workers.dev/status';
const logs = [];

function ts() {
  return new Date().toISOString().replace('T',' ').slice(0,19);
}

function addLog(msg, type = '') {
  logs.push({ t: ts(), msg, type });
  if (logs.length > 50) logs.shift();
  renderLogs();
}

function renderLogs() {
  const panel = document.getElementById('logPanel');
  panel.innerHTML = logs.slice().reverse().map(l =>
    `<div class="log-line">
      <span class="log-time">${l.t}</span>
      <span class="log-msg ${l.type}">${l.msg}</span>
    </div>`
  ).join('');
}

function setOnline(data) {
  const card = document.getElementById('statusCard');
  card.className = 'status-card online';

  const ring = document.getElementById('pulseRing');
  ring.className = 'pulse-ring';
  document.getElementById('pulseDot').className = 'pulse-dot';

  document.getElementById('statusText').innerHTML = 'ONLINE <span class="blink">_</span>';
  document.getElementById('statusText').className = 'status-text online';

  document.getElementById('uptime').textContent = data.uptime || '──';
  document.getElementById('uptime').className = 'metric-value';

  document.getElementById('uptimeSeconds').textContent =
    data.uptime_seconds != null ? `${data.uptime_seconds.toLocaleString()} seconds` : '──';
  document.getElementById('uptimeSeconds').className = 'metric-value small';

  document.getElementById('tunnelUrl').textContent = data.runner_url || '──';
  document.getElementById('tunnelUrl').className = 'metric-value small';
}

function setOffline(label, runnerUrl) {
  const card = document.getElementById('statusCard');
  card.className = 'status-card offline';

  const ring = document.getElementById('pulseRing');
  ring.className = 'pulse-ring offline';
  document.getElementById('pulseDot').className = 'pulse-dot offline';

  document.getElementById('statusText').innerHTML = `${label} <span class="blink">_</span>`;
  document.getElementById('statusText').className = 'status-text offline';

  document.getElementById('uptime').textContent = '──────';
  document.getElementById('uptime').className = 'metric-value dim';

  document.getElementById('uptimeSeconds').textContent = '──────';
  document.getElementById('uptimeSeconds').className = 'metric-value small dim';

  document.getElementById('tunnelUrl').textContent = runnerUrl || '──────';
  document.getElementById('tunnelUrl').className = `metric-value small ${runnerUrl ? '' : 'dim'}`;
}

async function fetchStatus() {
  addLog('polling status endpoint...');
  try {
    const res = await fetch(WORKER_STATUS_URL, { cache: 'no-store' });
    const data = await res.json();

    if (data.status === 'ok') {
      setOnline(data);
      addLog(`online · uptime ${data.uptime}`);
    } else if (data.status === 'unreachable') {
      setOffline('UNREACHABLE', data.runner_url);
      addLog(`tunnel registered but fastapi unreachable: ${data.runner_url}`, 'warn');
    } else {
      setOffline('OFFLINE', null);
      addLog('runner offline — no tunnel registered', 'warn');
    }
  } catch (e) {
    setOffline('ERROR', null);
    addLog(`fetch failed: ${e.message}`, 'err');
  }

  document.getElementById('lastCheck').textContent = `LAST CHECK ${ts()}`;

  // Restart countdown animation
  const bar = document.getElementById('refreshBar');
  bar.style.animation = 'none';
  bar.offsetHeight; // reflow
  bar.style.animation = 'countdown 30s linear forwards';
}

fetchStatus();
setInterval(fetchStatus, 30000);
</script>
</body>
</html>
