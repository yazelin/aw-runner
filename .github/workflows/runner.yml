name: runner

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6h (fallback); self-trigger fires at 5h55m
  workflow_dispatch:

jobs:
  serve:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -fsSL https://pkg.cloudflare.com/cloudflare-main.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/cloudflare-main.gpg
          echo 'deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] https://pkg.cloudflare.com/cloudflared focal main' \
            | sudo tee /etc/apt/sources.list.d/cloudflared.list
          sudo apt-get update -q && sudo apt-get install -y cloudflared

      - name: Install Copilot CLI
        run: npm install -g @github/copilot
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

      - name: Setup MCP config
        run: |
          mkdir -p ~/.copilot
          cp .github/mcp-config.json ~/.copilot/mcp-config.json
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

      - name: Install Python deps
        run: pip install -r server/requirements.txt

      - name: Start FastAPI server
        run: uvicorn server.main:app --host 0.0.0.0 --port 8000 &
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          RUNNER_API_KEY: ${{ secrets.RUNNER_API_KEY }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

      - name: Wait for server to start
        run: sleep 3

      - name: Verify server health
        run: curl -sf http://localhost:8000/health

      - name: Start cloudflared quick tunnel and register URL
        run: |
          cloudflared tunnel --url http://localhost:8000 --logfile /tmp/cf.log &
          sleep 10
          TUNNEL_URL=$(grep -oP 'https://\S+\.trycloudflare\.com' /tmp/cf.log | head -1)
          echo "Tunnel URL: $TUNNEL_URL"
          curl -sf -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/storage/kv/namespaces/${{ secrets.KV_NAMESPACE_ID }}/values/runner_url" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -d "$TUNNEL_URL"
        env:
          NO_AUTOUPDATE: "true"

      - name: Notify runner online
        run: |
          TUNNEL_URL=$(grep -oP 'https://\S+\.trycloudflare\.com' /tmp/cf.log | head -1)
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG=$(printf "🟢 aw-runner 已上線\nTunnel: %s\nRun: %s" "$TUNNEL_URL" "$RUN_URL")
          python3 .github/scripts/send_telegram_message.py "${{ secrets.TELEGRAM_CHAT_ID }}" "$MSG"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Sleep 5h55m
        run: sleep 21300

      - name: Self-trigger next run
        run: gh workflow run runner.yml --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
